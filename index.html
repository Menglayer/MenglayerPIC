<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>萌芽水印</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #333;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 24px 24px 32px;
      max-width: 900px;
      width: 100%;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 22px;
      text-align: center;
      color: #2b3a42;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
    }

    /* 水印位置选择器 */
    .position-group {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #555;
    }

    .position-grid {
      display: grid;
      grid-template-columns: repeat(3, 28px);
      grid-template-rows: repeat(3, 28px);
      gap: 3px;
    }

    .position-grid input[type="radio"] {
      display: none;
    }

    .position-grid label {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      border: 2px solid #dce4ea;
      background: #f0f4f7;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #999;
      transition: all 0.15s ease;
      user-select: none;
    }

    .position-grid label:hover {
      border-color: #98c5d2;
      background: #e8f4f8;
    }

    .position-grid input[type="radio"]:checked+label {
      border-color: #5da4c1;
      background: linear-gradient(135deg, #98c5d2, #5da4c1);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(93, 164, 193, 0.35);
    }

    /* 隐藏不需要的网格单元 */
    .position-grid .empty-cell {
      visibility: hidden;
    }

    input[type="file"] {
      font-size: 14px;
    }

    input[type="range"] {
      width: 160px;
    }

    button {
      cursor: pointer;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: linear-gradient(135deg, #98c5d2, #5da4c1);
      box-shadow: 0 6px 16px rgba(93, 164, 193, 0.35);
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.08s ease;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    button:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(93, 164, 193, 0.4);
    }

    .preview-wrapper {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }

    canvas {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      background: #f0f4f7;
    }

    .tip {
      margin-top: 8px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🌱 萌芽水印</h1>

    <div class="controls">
      <label>
        选择图片：
        <input id="fileInput" type="file" accept="image/*" />
      </label>

      <label>
        水印透明度：
        <input id="opacityRange" type="range" min="0" max="100" value="80" />
        <span id="opacityLabel">80%</span>
      </label>

      <div class="position-group">
        <span>水印位置：</span>
        <div class="position-grid">
          <input type="radio" name="wmPos" id="pos-tl" value="top-left" />
          <label for="pos-tl" title="左上">↖</label>

          <span class="empty-cell"></span>

          <input type="radio" name="wmPos" id="pos-tr" value="top-right" />
          <label for="pos-tr" title="右上">↗</label>

          <span class="empty-cell"></span>

          <input type="radio" name="wmPos" id="pos-center" value="center" checked />
          <label for="pos-center" title="中间">✦</label>

          <span class="empty-cell"></span>

          <input type="radio" name="wmPos" id="pos-bl" value="bottom-left" />
          <label for="pos-bl" title="左下">↙</label>

          <span class="empty-cell"></span>

          <input type="radio" name="wmPos" id="pos-br" value="bottom-right" />
          <label for="pos-br" title="右下">↘</label>
        </div>
      </div>

      <button id="downloadBtn" disabled>下载处理后的图片</button>
    </div>

    <div class="preview-wrapper">
      <canvas id="canvas"></canvas>
    </div>

    <div class="tip">
      - 自动加上 <span style="color:#98c5d2;font-weight:600;">#98c5d2</span> 边框
      - 水印可选择位置（左上 / 右上 / 中间 / 左下 / 右下），默认居中，大小随原图自适应，可调节透明度
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const opacityRange = document.getElementById("opacityRange");
    const opacityLabel = document.getElementById("opacityLabel");
    const downloadBtn = document.getElementById("downloadBtn");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // 你的水印图片（建议和 index.html 同目录）
    const watermarkSrc = "watermark.png"; // 改成你实际的文件名/路径
    const watermarkImg = new Image();
    watermarkImg.src = watermarkSrc;
    let watermarkLoaded = false;

    watermarkImg.onload = () => {
      watermarkLoaded = true;
      // 如果已经有主图片，重新绘制以应用水印
      if (currentImage) drawImageWithWatermark();
    };

    let currentImage = null;

    function drawImageWithWatermark() {
      if (!currentImage || !watermarkLoaded) return;

      const borderColor = "#98c5d2";
      const borderWidth =
        Math.max(currentImage.width, currentImage.height) * 0.01 + 2; // 自适应边框宽度

      // 画布大小 = 图片大小 + 边框
      canvas.width = currentImage.width + borderWidth * 2;
      canvas.height = currentImage.height + borderWidth * 2;

      // 背景填白
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 绘制原图
      ctx.drawImage(
        currentImage,
        borderWidth,
        borderWidth,
        currentImage.width,
        currentImage.height
      );

      // 绘制边框
      ctx.lineWidth = borderWidth;
      ctx.strokeStyle = borderColor;
      ctx.strokeRect(
        borderWidth / 2,
        borderWidth / 2,
        canvas.width - borderWidth,
        canvas.height - borderWidth
      );

      // 水印透明度（0~1）
      const opacity = Number(opacityRange.value) / 100;
      ctx.save();
      ctx.globalAlpha = opacity;

      // 水印尺寸：相对于短边的一定比例
      const minSide = Math.min(currentImage.width, currentImage.height);
      const watermarkTargetSize = minSide * 0.35; // 水印占短边约 35%
      const ratio = watermarkImg.width / watermarkImg.height;

      let wmWidth, wmHeight;
      if (ratio >= 1) {
        wmWidth = watermarkTargetSize;
        wmHeight = watermarkTargetSize / ratio;
      } else {
        wmHeight = watermarkTargetSize;
        wmWidth = watermarkTargetSize * ratio;
      }

      // 根据选择的位置计算坐标
      const posRadio = document.querySelector('input[name="wmPos"]:checked');
      const position = posRadio ? posRadio.value : 'center';
      const margin = borderWidth + minSide * 0.03; // 距边缘的间距

      let wmX, wmY;
      switch (position) {
        case 'top-left':
          wmX = margin;
          wmY = margin;
          break;
        case 'top-right':
          wmX = canvas.width - wmWidth - margin;
          wmY = margin;
          break;
        case 'bottom-left':
          wmX = margin;
          wmY = canvas.height - wmHeight - margin;
          break;
        case 'bottom-right':
          wmX = canvas.width - wmWidth - margin;
          wmY = canvas.height - wmHeight - margin;
          break;
        case 'center':
        default:
          wmX = canvas.width / 2 - wmWidth / 2;
          wmY = canvas.height / 2 - wmHeight / 2;
          break;
      }

      ctx.drawImage(watermarkImg, wmX, wmY, wmWidth, wmHeight);

      ctx.restore();
    }

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          currentImage = img;
          if (watermarkLoaded) {
            drawImageWithWatermark();
            downloadBtn.disabled = false;
          }
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    opacityRange.addEventListener("input", () => {
      opacityLabel.textContent = `${opacityRange.value}%`;
      if (currentImage && watermarkLoaded) {
        drawImageWithWatermark();
      }
    });

    // 监听水印位置变化
    document.querySelectorAll('input[name="wmPos"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        if (currentImage && watermarkLoaded) {
          drawImageWithWatermark();
        }
      });
    });

    downloadBtn.addEventListener("click", () => {
      if (!currentImage || !watermarkLoaded) return;

      const link = document.createElement("a");
      link.download = "watermarked.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  </script>
</body>

</html>
